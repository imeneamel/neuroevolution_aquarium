<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquarium Évolutif</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#020810; --panel:#050d18; --border:#0a1e30;
  --text:#b8d4e8; --muted:#3a5a75; --accent:#00b4d8;
  --font-ui:'JetBrains Mono','Fira Code','Consolas',monospace;
  --font-label:system-ui,-apple-system,sans-serif;
}
body { background:var(--bg); color:var(--text); font-family:var(--font-ui);
       display:flex; flex-direction:column; height:100vh; overflow:hidden; }
header { display:flex; align-items:center; justify-content:space-between;
         padding:9px 18px; border-bottom:1px solid var(--border);
         background:var(--panel); flex-shrink:0; }
.title-block { display:flex; align-items:baseline; gap:12px; }
h1 { font-family:var(--font-label); font-size:14px; font-weight:700;
     letter-spacing:.14em; text-transform:uppercase; color:var(--accent); }
.subtitle { font-size:10px; color:var(--muted); }
.controls { display:flex; gap:8px; align-items:center; }
button { background:transparent; border:1px solid var(--border);
         color:var(--text); font-family:var(--font-ui); font-size:11px;
         padding:4px 11px; cursor:pointer; border-radius:2px;
         transition:border-color .15s,color .15s; }
button:hover { border-color:var(--accent); color:var(--accent); }
button.active { border-color:var(--accent); color:var(--accent); background:rgba(0,180,216,.07); }
.speed-label { font-size:10px; color:var(--muted); }
.main { display:flex; flex:1; overflow:hidden; }
.canvas-wrap { position:relative; flex:1; overflow:hidden; }
canvas#aquarium { width:100%; height:100%; display:block; }
.panel { width:280px; flex-shrink:0; background:var(--panel);
         border-left:1px solid var(--border); display:flex;
         flex-direction:column; overflow:hidden; }
.panel-section { padding:12px 14px; border-bottom:1px solid var(--border); }
.panel-section:last-child { border-bottom:none; flex:1; overflow-y:auto; }
.section-title { font-size:9px; letter-spacing:.18em; text-transform:uppercase;
                 color:var(--muted); margin-bottom:10px; }
.lineage-card { margin-bottom:10px; padding:9px;
                border:1px solid var(--border); border-left:3px solid var(--lcolor);
                background:rgba(255,255,255,.012); border-radius:2px; }
.lineage-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:5px; }
.lineage-name { font-size:12px; font-weight:600; color:var(--lcolor); font-family:var(--font-label); }
.lineage-status { font-size:9px; color:var(--muted); }
.stat-row { display:flex; justify-content:space-between;
            font-size:10px; color:var(--muted); margin-bottom:2px; }
.stat-val { color:var(--text); }
.hunger-bar-wrap { margin:4px 0; display:flex; align-items:center; gap:5px; }
.hunger-bar-bg { flex:1; height:4px; background:rgba(255,255,255,.06); border-radius:2px; overflow:hidden; }
.hunger-bar-fill { height:100%; border-radius:2px; transition:width .3s; }
.hunger-label { font-size:9px; color:var(--muted); width:28px; text-align:right; }
.behav-insight { font-size:9px; color:#a0b8cc; margin-top:6px; line-height:1.5;
                 padding:5px 6px; background:rgba(0,180,216,.05);
                 border-left:2px solid var(--accent); border-radius:0 2px 2px 0; }
.behav-tag { font-size:9px; padding:2px 5px; border:1px solid;
             display:inline-block; margin-top:4px; border-radius:2px; }
canvas.sparkline { width:100%; height:26px; display:block; margin-top:6px; }
.global-stat { display:flex; justify-content:space-between; font-size:10px; margin-bottom:3px; }
.global-stat .val { color:var(--accent); }
#tooltip { position:absolute; background:rgba(2,8,16,.96);
           border:1px solid var(--border); color:var(--text);
           font-size:10px; padding:7px 11px; pointer-events:none;
           display:none; z-index:10; line-height:1.8; border-radius:2px; }
.legend { position:absolute; bottom:12px; left:12px;
          display:flex; gap:12px; flex-wrap:wrap; }
.leg-item { display:flex; align-items:center; gap:5px; font-size:9px; color:var(--muted); }
.leg-dot { width:7px; height:7px; border-radius:50%; }
</style>
</head>
<body>
<header>
  <div class="title-block">
    <h1>AQUARIUM ÉVOLUTIF</h1>
    <span class="subtitle">5 lignées · évolution comportementale · faim + prédation</span>
  </div>
  <div class="controls">
    <span class="speed-label">vitesse</span>
    <button id="btn1x" class="active" onclick="setSpeed(1)">×1</button>
    <button id="btn3x" onclick="setSpeed(3)">×3</button>
    <button id="btn10x" onclick="setSpeed(10)">×10</button>
    <button onclick="resetSim()">↺ reset</button>
    <button id="btnPause" onclick="togglePause()">⏸ pause</button>
  </div>
</header>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="aquarium"></canvas>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#39ff8a"></div>nourriture</div>
      <div class="leg-item"><div class="leg-dot" style="background:#cc2020"></div>prédateur actif</div>
      <div class="leg-item"><div class="leg-dot" style="background:#441515"></div>prédateur inactif</div>
    </div>
    <div id="tooltip"></div>
  </div>
  <div class="panel">
    <div class="panel-section">
      <div class="section-title">simulation</div>
      <div class="global-stat"><span>tick</span><span class="val" id="gTick">0</span></div>
      <div class="global-stat"><span>vivants</span><span class="val" id="gAlive">5/5</span></div>
      <div class="global-stat"><span>nourriture dispo</span><span class="val" id="gFood">—</span></div>
      <div class="global-stat"><span>prédateur</span><span class="val" id="gPred">—</span></div>
    </div>
    <div class="panel-section" style="flex:1;overflow-y:auto">
      <div class="section-title">lignées</div>
      <div id="lineageCards"></div>
    </div>
  </div>
</div>

<script src="ab.js"></script>

</body>
</html>
